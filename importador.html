<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Importador — Policontrol Licitações</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: #f5f4f0; color: #1a1a18; padding: 24px; }
  .card { background: #fff; border: 1px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 24px; max-width: 720px; margin: 0 auto 20px; }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  p { font-size: 13px; color: #6b6b66; line-height: 1.6; margin-bottom: 12px; }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .field label { font-size: 11px; font-weight: 700; color: #6b6b66; text-transform: uppercase; letter-spacing: .05em; }
  .field input { font-size: 13px; padding: 8px 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.22); width: 100%; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; font-size: 13px; font-weight: 600; border-radius: 8px; border: 1px solid rgba(0,0,0,0.22); background: #fff; cursor: pointer; }
  .btn.primary { background: #1a1a18; color: #fff; border-color: #1a1a18; }
  .btn:disabled { opacity: .4; cursor: default; }
  .file-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .file-row label { font-size: 11px; font-weight: 700; color: #6b6b66; text-transform: uppercase; letter-spacing: .05em; }
  .log { background: #1a1a18; color: #e0e0e0; font-family: monospace; font-size: 12px; padding: 16px; border-radius: 8px; max-height: 500px; overflow-y: auto; white-space: pre-wrap; margin-top: 16px; display: none; }
  .log .ok { color: #4ade80; } .log .err { color: #f87171; } .log .info { color: #60a5fa; } .log .warn { color: #fbbf24; }
  .progress { background: #f0ede8; border-radius: 6px; height: 10px; margin: 10px 0; overflow: hidden; display: none; }
  .progress-fill { height: 100%; background: #1d9e75; border-radius: 6px; transition: width .3s; }
  .warning { background: #faeeda; border: 1px solid #f5c06b; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #633806; margin-bottom: 16px; }
  .sec { font-size: 12px; font-weight: 700; color: #6b6b66; text-transform: uppercase; letter-spacing: .05em; margin: 20px 0 10px; border-top: 1px solid rgba(0,0,0,0.08); padding-top: 16px; }
  code { background: #f0ede8; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>
<div class="card">
  <h1>📥 Importador de Planilhas</h1>
  <p>Importa dados das planilhas Excel para o banco. <strong>Rode apenas uma vez.</strong> Para reimportar, limpe com: <code>delete from pregoes;</code></p>
  <div class="warning">⚠️ Importar duas vezes cria dados duplicados.</div>

  <div class="field"><label>Supabase Project URL</label><input id="cfg-url" placeholder="https://xyzxyz.supabase.co"></div>
  <div class="field"><label>Supabase Anon Key</label><input id="cfg-key" placeholder="eyJhbGci..."></div>

  <div class="sec">Planilha de Licitações (FORM VEN 012)</div>
  <div class="file-row"><label>Abas: Pesquisa, Não participamos, Perdidas</label><input type="file" id="file-lic" accept=".xlsx,.xls"></div>

  <div class="sec">Planilha de Pedidos e Saldo (FORM VEN 014)</div>
  <div class="file-row"><label>Abas: Vencidas/Saldo, Pedidos RC/LINE/POLI</label><input type="file" id="file-ped" accept=".xlsx,.xls"></div>

  <button class="btn primary" id="btn-import" onclick="startImport()" style="margin-top:8px">🚀 Importar dados</button>
  <div class="progress" id="prog-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="log" id="log"></div>
</div>

<script>
let SB = null;

function log(msg, type='') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  const span = document.createElement('span');
  span.className = type;
  span.textContent = msg + '\n';
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}
function setProgress(pct) {
  document.getElementById('prog-bar').style.display = 'block';
  document.getElementById('prog-fill').style.width = pct + '%';
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function startImport() {
  const url = document.getElementById('cfg-url').value.trim();
  const key = document.getElementById('cfg-key').value.trim();
  const fileLic = document.getElementById('file-lic').files[0];
  const filePed = document.getElementById('file-ped').files[0];
  if (!url || !key) return alert('Cole a URL e Key do Supabase');
  if (!fileLic && !filePed) return alert('Selecione ao menos uma planilha');

  SB = supabase.createClient(url, key);
  const btn = document.getElementById('btn-import');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';

  try {
    log('🔌 Conectando...', 'info');
    const { error: pingErr } = await SB.from('pregoes').select('id').limit(1);
    if (pingErr) throw new Error('Erro de conexão: ' + pingErr.message);
    log('✅ Conectado!\n', 'ok');

    if (fileLic) {
      log('══════ FORM VEN 012 — LICITAÇÕES ══════', 'info');
      await importLicitacoes(fileLic);
    }
    setProgress(50);

    if (filePed) {
      log('\n══════ FORM VEN 014 — PEDIDOS E SALDO ══════', 'info');
      await importPedidosSaldo(filePed);
    }
    setProgress(100);
    log('\n🎉 Importação concluída!', 'ok');
  } catch(e) {
    log('\n❌ Erro: ' + e.message, 'err');
    console.error(e);
  }
  btn.disabled = false;
}

// ── Helpers ──
async function readExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(XLSX.read(e.target.result, { type: 'binary', cellDates: false }));
    reader.onerror = reject;
    reader.readAsBinaryString(file);
  });
}
function sheetRows(wb, name) {
  const ws = wb.Sheets[name]; if (!ws) return null;
  return XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: true });
}
function clean(v) {
  if (v === null || v === undefined) return '';
  const s = String(v).trim();
  return (s === '-' || s === '—' || s === '--') ? '' : s;
}
function parseDate(v) {
  if (!v && v !== 0) return null;
  // Excel serial number (most common case in these sheets)
  const n = Number(v);
  if (!isNaN(n) && n > 40000 && n < 70000) {
    // Excel serial to JS date (accounting for Excel's leap year bug)
    const ms = (n - 25569) * 86400 * 1000;
    const d = new Date(ms);
    if (!isNaN(d)) return d.toISOString().slice(0,10);
  }
  const s = String(v).trim();
  if (!s || s === '-' || s === '—') return null;
  // DD/MM/YYYY
  const m1 = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (m1) { const yr = m1[3].length===2?'20'+m1[3]:m1[3]; return `${yr}-${m1[2].padStart(2,'0')}-${m1[1].padStart(2,'0')}`; }
  // YYYY-MM-DD
  const m2 = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m2) return s;
  return null;
}
function parseNum(v) {
  if (!v && v !== 0) return null;
  const n = Number(String(v).replace(',','.'));
  return isNaN(n) ? null : n;
}
function normLit(v) {
  const s = clean(v).toUpperCase();
  return s === 'LINE' ? 'LINE' : 'RC';
}
const MESES = ['JANEIRO','FEVEREIRO','MARÇO','ABRIL','MAIO','JUNHO','JULHO','AGOSTO','SETEMBRO','OUTUBRO','NOVEMBRO','DEZEMBRO'];

function findHeaderRow(rows, marker='LICITANTE') {
  return rows.findIndex(r => r.some(c => String(c).toUpperCase().trim() === marker));
}
function buildIdx(headers) {
  const h = headers.map(c => String(c).toUpperCase().trim());
  const fi = (fn) => h.findIndex(fn);
  return {
    licitante: fi(c => c === 'LICITANTE'),
    empresa:   fi(c => c === 'EMPRESA'),
    uf:        fi(c => c === 'UF'),
    pregao:    fi(c => c.includes('PREG') && !c.includes('SRP')),
    uasg:      fi(c => c === 'UASG'),
    bb:        fi(c => c === 'BB'),
    data:      fi(c => c === 'DATA'),
    site:      fi(c => c === 'SITE'),
    status:    fi(c => c === 'STATUS'),
    obs:       fi(c => c.startsWith('OBS') && !c.includes('SUP') && !c.includes('LIC')),
    vendedor:  fi(c => c === 'VENDEDOR'),
    motivo:    fi(c => c.includes('MOTIVO')),
    produto:   fi(c => c === 'PRODUTO'),
    vencedor:  fi(c => c.includes('EMPRESA') && c.includes('VENCEDOR')),
    qtd:       fi(c => c === 'QUANTIDADE'),
    val_venc:  fi(c => c.includes('VALOR') && c.includes('VENCEDOR')),
    val_min:   fi(c => c.includes('VALOR') && (c.includes('MÍNIMO')||c.includes('MINIMO'))),
    qtd_ganha: fi(c => c.includes('GANHAMOS') || c === 'QTD GANHA'),
    val_unit:  fi(c => c.includes('UNITÁRIO') || c.includes('UNITARIO')),
    qtd_comp:  fi(c => c.includes('COMPRADA')),
    prazo:     fi(c => c.includes('PRAZO') && c.includes('ENTREGA')),
    rp:        fi(c => c === 'RP'),
    rp_rep:    fi(c => c.includes('REPASSE')),
    cliente:   fi(c => c === 'CLIENTE'),
    val_tot:   fi(c => c.includes('VALOR') && c.includes('TOTAL')),
    entrega:   fi(c => c === 'ENTREGA'),
    prorrog:   fi(c => c.includes('PRORROG')),
    obs_sup:   fi(c => c.includes('OBS') && c.includes('SUPR')),
    obs_lic:   fi(c => c.includes('OBS') && c.includes('LICIT')),
    material:  fi(c => c === 'MATERIAL'),
    quantidade:fi(c => c === 'QUANTIDADE'),
  };
}

// ── Find or create pregão (for merge logic) ──
async function findPregao(licitante, pregaoNum, cliente) {
  if (!pregaoNum) return null;
  const { data } = await SB.from('pregoes')
    .select('id')
    .eq('licitante', licitante)
    .eq('pregao', pregaoNum)
    .limit(1);
  return (data && data.length) ? data[0].id : null;
}

// ══════════════════════════════════════════
// FORM VEN 012
// ══════════════════════════════════════════
async function importLicitacoes(file) {
  const wb = await readExcel(file);
  log('Abas: ' + wb.SheetNames.join(', '));
  await importPesquisa(wb);
  await importNaoParticipamos(wb);
  await importPerdidas(wb);
}

async function importPesquisa(wb) {
  const name = wb.SheetNames.find(s => s.toLowerCase().includes('pesquisa'));
  if (!name) { log('⚠️ Aba Pesquisa não encontrada', 'warn'); return; }
  const rows = sheetRows(wb, name);
  const hi = findHeaderRow(rows); if (hi < 0) { log('⚠️ Cabeçalho Pesquisa não encontrado', 'warn'); return; }
  const idx = buildIdx(rows[hi]);
  const dataRows = rows.slice(hi+1).filter(r => r.some(c => c !== ''));
  log(`\n📋 Pesquisa: ${dataRows.length} linhas`);

  const toInsert = [];
  for (const r of dataRows) {
    const empresa = clean(r[idx.empresa]); if (!empresa) continue;
    const meses_check = empresa.toUpperCase();
    if (MESES.includes(meses_check)) continue;
    toInsert.push({
      licitante: normLit(r[idx.licitante]), cliente: empresa,
      uf: clean(r[idx.uf]), pregao: clean(r[idx.pregao]),
      uasg: clean(r[idx.uasg]), bb: clean(r[idx.bb]),
      data: parseDate(r[idx.data]), site: clean(r[idx.site]),
      status: clean(r[idx.status]), obs: clean(r[idx.obs]),
      vendedor: clean(r[idx.vendedor]) || 'Sem Vendedor',
      encerrado: false, fase: 'ativo',
    });
  }
  let ok=0, err=0;
  for (let i=0; i<toInsert.length; i+=20) {
    const { error } = await SB.from('pregoes').insert(toInsert.slice(i,i+20));
    if (error) { log(`  ❌ ${error.message}`, 'err'); err+=Math.min(20,toInsert.length-i); }
    else ok+=Math.min(20,toInsert.length-i);
    await sleep(50);
  }
  log(`✅ Pesquisa: ${ok} importados, ${err} erros`, 'ok');
  setProgress(15);
}

async function importNaoParticipamos(wb) {
  const name = wb.SheetNames.find(s => s.toLowerCase().includes('participamos'));
  if (!name) { log('⚠️ Não participamos não encontrada', 'warn'); return; }
  const rows = sheetRows(wb, name);
  const hi = findHeaderRow(rows); if (hi < 0) return;
  const idx = buildIdx(rows[hi]);
  const dataRows = rows.slice(hi+1).filter(r => r.some(c => c !== ''));
  log(`\n📋 Não participamos: ${dataRows.length} linhas`);

  const toInsert = [];
  for (const r of dataRows) {
    const empresa = clean(r[idx.empresa]); if (!empresa) continue;
    if (MESES.includes(empresa.toUpperCase())) continue;
    toInsert.push({
      licitante: normLit(r[idx.licitante]), cliente: empresa,
      uf: clean(r[idx.uf]), pregao: clean(r[idx.pregao]),
      uasg: clean(r[idx.uasg]), bb: clean(r[idx.bb]),
      data: parseDate(r[idx.data]), site: clean(r[idx.site]),
      obs: clean(r[idx.motivo]), encerrado: false, fase: 'arquivado',
    });
  }
  let ok=0, err=0;
  for (let i=0; i<toInsert.length; i+=20) {
    const { error } = await SB.from('pregoes').insert(toInsert.slice(i,i+20));
    if (error) { log(`  ❌ ${error.message}`, 'err'); err+=Math.min(20,toInsert.length-i); }
    else ok+=Math.min(20,toInsert.length-i);
    await sleep(50);
  }
  log(`✅ Não participamos: ${ok} importados (ocultos), ${err} erros`, 'ok');
  setProgress(30);
}

async function importPerdidas(wb) {
  const name = wb.SheetNames.find(s => s.toLowerCase().includes('perdida'));
  if (!name) { log('⚠️ Perdidas não encontrada', 'warn'); return; }
  const rows = sheetRows(wb, name);
  const hi = findHeaderRow(rows); if (hi < 0) return;
  const idx = buildIdx(rows[hi]);
  log(`\n📋 Perdidas: processando...`);

  // Group by pregão
  const grupos = {}; let cur = {};
  for (const r of rows.slice(hi+1)) {
    if (!r.some(c => c !== '')) continue;
    const first = clean(r[0]).toUpperCase();
    if (MESES.includes(first) || first === 'TOTAL') continue;
    const empresa = clean(r[idx.empresa]);
    if (empresa && !MESES.includes(empresa.toUpperCase())) {
      cur = {
        licitante: normLit(r[idx.licitante]), cliente: empresa,
        uf: clean(r[idx.uf]), pregao: clean(r[idx.pregao]),
        uasg: clean(r[idx.uasg]), data: parseDate(r[idx.data]),
        site: clean(r[idx.site]),
      };
    }
    const produto = clean(r[idx.produto]);
    if (!produto || !cur.pregao) continue;
    const key = `${cur.licitante}|${cur.pregao}`;
    if (!grupos[key]) grupos[key] = { ...cur, itens: [] };
    grupos[key].itens.push({
      produto, resultado: 'perdido',
      empresa_venc: clean(r[idx.vencedor]),
      qtd_venc: parseNum(r[idx.qtd]),
      valor_venc: parseNum(r[idx.val_venc]),
      valor_min: parseNum(r[idx.val_min]),
      motivo_perda: clean(r[idx.motivo]),
    });
  }

  let ok=0, err=0, merged=0;
  for (const p of Object.values(grupos)) {
    if (!p.pregao) continue;
    // Check if pregão already exists (from saldo sheet) — merge instead of duplicate
    const existingId = await findPregao(p.licitante, p.pregao, p.cliente);
    let pregaoId = existingId;

    if (!existingId) {
      const { data: ins, error } = await SB.from('pregoes').insert({
        licitante:p.licitante, cliente:p.cliente, uf:p.uf, pregao:p.pregao,
        uasg:p.uasg, data:p.data, site:p.site, encerrado:true, fase:'ativo'
      }).select('id').single();
      if (error) { err++; continue; }
      pregaoId = ins.id;
      ok++;
    } else {
      merged++;
    }

    if (p.itens.length) {
      await SB.from('itens').insert(p.itens.map(it => ({ ...it, pregao_id: pregaoId })));
    }
    await sleep(30);
  }
  log(`✅ Perdidas: ${ok} criados, ${merged} fundidos com existentes, ${err} erros`, 'ok');
  setProgress(45);
}

// ══════════════════════════════════════════
// FORM VEN 014
// ══════════════════════════════════════════
async function importPedidosSaldo(file) {
  const wb = await readExcel(file);
  log('Abas: ' + wb.SheetNames.join(', '));

  // Saldo sheets first (creates pregoes)
  const saldoSheets = wb.SheetNames.filter(s =>
    s.toLowerCase().includes('saldo') || s.toLowerCase().includes('vencida')
  );
  log(`\nAbas de saldo: ${saldoSheets.join(', ')}`);
  for (const name of saldoSheets) await importSaldo(wb, name);
  setProgress(70);

  // Pedidos sheets
  const pedSheets = wb.SheetNames.filter(s =>
    s.toLowerCase().includes('pedido') && !s.toLowerCase().includes('saldo')
  );
  log(`\nAbas de pedidos: ${pedSheets.join(', ')}`);
  for (const name of pedSheets) await importPedidos(wb, name);
  setProgress(95);
}

async function importSaldo(wb, name) {
  const rows = sheetRows(wb, name); if (!rows) return;
  const hi = findHeaderRow(rows);
  if (hi < 0) { log(`⚠️ Cabeçalho não encontrado em "${name}"`, 'warn'); return; }
  const idx = buildIdx(rows[hi]);
  log(`\n📋 "${name}": processando...`);

  const grupos = {}; let cur = {};
  for (const r of rows.slice(hi+1)) {
    if (!r.some(c => c !== '')) continue;
    const first = clean(r[0]).toUpperCase();
    if (MESES.includes(first) || first === 'TOTAL') continue;

    const empresa = idx.empresa >= 0 ? clean(r[idx.empresa]) : '';
    const pregao  = idx.pregao  >= 0 ? clean(r[idx.pregao])  : '';
    if (empresa && !MESES.includes(empresa.toUpperCase())) {
      cur = {
        licitante: normLit(r[0]), cliente: empresa, pregao,
        uf:   idx.uf   >= 0 ? clean(r[idx.uf])        : '',
        uasg: idx.uasg >= 0 ? clean(r[idx.uasg])       : '',
        data: idx.data >= 0 ? parseDate(r[idx.data])   : null,
        site: idx.site >= 0 ? clean(r[idx.site])       : '',
        prazo_entrega: idx.prazo >= 0 ? clean(r[idx.prazo]) : '',
      };
    }
    const produto = idx.produto >= 0 ? clean(r[idx.produto]) : '';
    if (!produto || !cur.pregao) continue;

    const key = `${cur.licitante}|${cur.pregao}`;
    if (!grupos[key]) grupos[key] = { ...cur, itens: [] };
    grupos[key].itens.push({
      produto, resultado: 'ganho',
      qtd_ganha:       parseNum(r[idx.qtd_ganha]) || 0,
      valor_unit:      parseNum(r[idx.val_unit]),
      qtd_comprada_hist: parseNum(r[idx.qtd_comp]) || 0,
    });
  }

  let ok=0, err=0;
  for (const p of Object.values(grupos)) {
    if (!p.cliente || !p.pregao) continue;
    const { data: ins, error } = await SB.from('pregoes').insert({
      licitante: p.licitante, cliente: p.cliente, pregao: p.pregao,
      uf: p.uf, uasg: p.uasg, data: p.data, site: p.site,
      prazo_entrega: p.prazo_entrega, encerrado: true, fase: 'ativo',
    }).select('id').single();
    if (error) { log(`  ❌ ${p.cliente}: ${error.message}`, 'err'); err++; continue; }

    if (p.itens.length) {
      await SB.from('itens').insert(p.itens.map(it => ({
        pregao_id: ins.id,
        produto: it.produto,
        resultado: 'ganho',
        qtd_ganha: it.qtd_ganha,
        valor_unit: it.valor_unit,
        qtd_comprada_hist: it.qtd_comprada_hist,
      })));
    }
    ok++; await sleep(40);
  }
  log(`✅ "${name}": ${ok} pregões, ${err} erros`, 'ok');
}

async function importPedidos(wb, name) {
  const rows = sheetRows(wb, name); if (!rows) return;
  const hi = findHeaderRow(rows, 'RP');
  if (hi < 0) { log(`⚠️ Cabeçalho não encontrado em "${name}"`, 'warn'); return; }
  const idx = buildIdx(rows[hi]);
  const litFromSheet = name.toUpperCase().includes('LINE') ? 'LINE' : 'RC';
  log(`\n📋 "${name}" (${litFromSheet}): processando...`);

  // Group by RP number
  const rps = {}; let curMes = '';
  for (const r of rows.slice(hi+1)) {
    if (!r.some(c => c !== '')) continue;
    const first = clean(r[0]).toUpperCase();
    if (MESES.includes(first)) { curMes = first; continue; }
    if (first === 'TOTAL') continue;

    const rpNum = clean(r[idx.rp]);
    if (!rpNum || isNaN(Number(rpNum))) continue;

    if (!rps[rpNum]) {
      rps[rpNum] = {
        numero: rpNum,
        rp_repasse: clean(r[idx.rp_rep]),
        cliente: clean(r[idx.cliente]),
        uf: clean(r[idx.uf]),
        pregao: clean(r[idx.pregao]),
        valor_total: parseNum(r[idx.val_tot]),
        entrega: parseDate(r[idx.entrega]),
        prorrogacao: parseDate(r[idx.prorrog]),
        obs_sup: clean(r[idx.obs_sup]),
        obs_lic: clean(r[idx.obs_lic]),
        licitante: litFromSheet,
        materiais: [],
      };
    }

    // Collect material/qtd pairs
    const mat = clean(r[idx.material]);
    const qtd = clean(r[idx.quantidade]);
    if (mat) {
      // May have multiple products separated by double space or newline
      const mats = mat.split(/\n|  +/).map(s=>s.trim()).filter(Boolean);
      const qtds = qtd.split(/\n|  +/).map(s=>s.trim()).filter(Boolean);
      mats.forEach((m, i) => {
        if (m) rps[rpNum].materiais.push(`${m}: ${qtds[i]||'?'}`);
      });
    }
  }

  let ok=0, skip=0, err=0;
  for (const rp of Object.values(rps)) {
    // Build obs with material info
    const matStr = rp.materiais.length ? `Materiais: ${rp.materiais.join(' | ')}` : '';
    const obsLic = [rp.obs_lic, matStr].filter(Boolean).join(' — ');

    // Try to find linked pregão
    let pregaoId = null;
    if (rp.pregao) {
      pregaoId = await findPregao(rp.licitante, rp.pregao, rp.cliente);
    }

    const { data: pedIns, error } = await SB.from('pedidos').insert({
      pregao_id: pregaoId,
      licitante: rp.licitante,
      numero: rp.numero,
      rp_repasse: rp.rp_repasse,
      cliente: rp.cliente,
      uf: rp.uf,
      valor_total: rp.valor_total,
      entrega: rp.entrega,
      prorrogacao: rp.prorrogacao,
      obs_sup: rp.obs_sup,
      obs_lic: obsLic,
      avulso: !pregaoId,
    }).select('id').single();

    if (error) { err++; continue; }
    ok++; await sleep(25);
  }
  log(`✅ "${name}": ${ok} RPs importados, ${err} erros`, 'ok');
}
</script>
