<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Importador — Policontrol Licitações</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: #f5f4f0; color: #1a1a18; padding: 24px; }
  .card { background: #fff; border: 1px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 24px; max-width: 720px; margin: 0 auto 20px; }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  p { font-size: 13px; color: #6b6b66; line-height: 1.6; margin-bottom: 12px; }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .field label { font-size: 11px; font-weight: 700; color: #6b6b66; text-transform: uppercase; letter-spacing: .05em; }
  .field input { font-size: 13px; padding: 8px 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.22); width: 100%; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; font-size: 13px; font-weight: 600; border-radius: 8px; border: 1px solid rgba(0,0,0,0.22); background: #fff; cursor: pointer; }
  .btn.primary { background: #1a1a18; color: #fff; border-color: #1a1a18; }
  .btn:disabled { opacity: .4; cursor: default; }
  .file-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .file-row label { font-size: 11px; font-weight: 700; color: #6b6b66; text-transform: uppercase; letter-spacing: .05em; }
  .log { background: #1a1a18; color: #e0e0e0; font-family: monospace; font-size: 12px; padding: 16px; border-radius: 8px; max-height: 500px; overflow-y: auto; white-space: pre-wrap; margin-top: 16px; display: none; }
  .log .ok { color: #4ade80; }
  .log .err { color: #f87171; }
  .log .info { color: #60a5fa; }
  .log .warn { color: #fbbf24; }
  .progress { background: #f0ede8; border-radius: 6px; height: 10px; margin: 10px 0; overflow: hidden; display: none; }
  .progress-fill { height: 100%; background: #1d9e75; border-radius: 6px; transition: width .3s; }
  .warning { background: #faeeda; border: 1px solid #f5c06b; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #633806; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="card">
  <h1>📥 Importador de Planilhas</h1>
  <p>Importa dados das planilhas Excel para o banco do sistema. Rode apenas uma vez — para reimportar, limpe o banco primeiro com o SQL: <code style="background:#f0ede8;padding:2px 6px;border-radius:4px">delete from pregoes;</code></p>
  <div class="warning">⚠️ <strong>Atenção:</strong> Importar duas vezes cria dados duplicados.</div>

  <div class="field"><label>Supabase Project URL</label><input id="cfg-url" placeholder="https://xyzxyz.supabase.co"></div>
  <div class="field"><label>Supabase Anon Key</label><input id="cfg-key" placeholder="eyJhbGci..."></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
    <div class="file-row"><label>Planilha de Licitações (FORM VEN 012)</label><input type="file" id="file-lic" accept=".xlsx,.xls"></div>
    <div class="file-row"><label>Planilha de Pedidos/Saldo (FORM VEN 014)</label><input type="file" id="file-ped" accept=".xlsx,.xls"></div>
  </div>

  <button class="btn primary" id="btn-import" onclick="startImport()">🚀 Importar dados</button>
  <div class="progress" id="prog-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="log" id="log"></div>
</div>

<script>
let SB = null;

function log(msg, type='') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  const span = document.createElement('span');
  span.className = type;
  span.textContent = msg + '\n';
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}
function setProgress(pct) {
  document.getElementById('prog-bar').style.display = 'block';
  document.getElementById('prog-fill').style.width = pct + '%';
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function startImport() {
  const url = document.getElementById('cfg-url').value.trim();
  const key = document.getElementById('cfg-key').value.trim();
  const fileLic = document.getElementById('file-lic').files[0];
  const filePed = document.getElementById('file-ped').files[0];
  if (!url || !key) return alert('Cole a URL e Key do Supabase');
  if (!fileLic && !filePed) return alert('Selecione ao menos uma planilha');

  SB = supabase.createClient(url, key);
  const btn = document.getElementById('btn-import');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';

  try {
    log('🔌 Conectando ao Supabase...', 'info');
    const { error: pingErr } = await SB.from('pregoes').select('id').limit(1);
    if (pingErr) throw new Error('Erro de conexão: ' + pingErr.message);
    log('✅ Conectado!\n', 'ok');

    if (fileLic) await importLicitacoes(fileLic);
    if (filePed) await importPedidosSaldo(filePed);

    log('\n🎉 Importação concluída! Acesse o sistema para ver os dados.', 'ok');
    setProgress(100);
  } catch(e) {
    log('\n❌ Erro fatal: ' + e.message, 'err');
    console.error(e);
  }
  btn.disabled = false;
}

async function readExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(XLSX.read(e.target.result, { type: 'binary', cellDates: true }));
    reader.onerror = reject;
    reader.readAsBinaryString(file);
  });
}

function sheetRows(wb, name) {
  const ws = wb.Sheets[name];
  if (!ws) return null;
  return XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
}

function clean(v) {
  if (v === null || v === undefined) return '';
  const s = String(v).trim();
  return (s === '-' || s === '—' || s === '--') ? '' : s;
}

function parseDate(v) {
  if (!v) return null;
  if (v instanceof Date) { if (isNaN(v)) return null; return v.toISOString().slice(0,10); }
  const s = String(v).trim();
  if (!s || s === '-' || s === '—') return null;
  const n = Number(s);
  if (!isNaN(n) && n > 40000 && n < 70000) {
    const d = new Date((n - 25569) * 86400 * 1000);
    return d.toISOString().slice(0,10);
  }
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (m) {
    const yr = m[3].length === 2 ? '20'+m[3] : m[3];
    return `${yr}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  }
  return null;
}

function normLit(v) {
  const s = clean(v).toUpperCase();
  if (s === 'LINE') return 'LINE';
  return 'RC';
}

const MESES = ['JANEIRO','FEVEREIRO','MARÇO','ABRIL','MAIO','JUNHO','JULHO','AGOSTO','SETEMBRO','OUTUBRO','NOVEMBRO','DEZEMBRO'];

function findHeaderRow(rows, marker='LICITANTE') {
  return rows.findIndex(r => r.some(c => String(c).toUpperCase().trim() === marker));
}

function buildIdx(headers) {
  const h = headers.map(c => String(c).toUpperCase().trim());
  return {
    licitante: h.findIndex(c => c === 'LICITANTE'),
    empresa:   h.findIndex(c => c === 'EMPRESA'),
    uf:        h.findIndex(c => c === 'UF'),
    pregao:    h.findIndex(c => c.includes('PREG')),
    uasg:      h.findIndex(c => c === 'UASG'),
    bb:        h.findIndex(c => c === 'BB'),
    data:      h.findIndex(c => c === 'DATA'),
    site:      h.findIndex(c => c === 'SITE'),
    status:    h.findIndex(c => c === 'STATUS'),
    obs:       h.findIndex(c => c.includes('OBS')),
    vendedor:  h.findIndex(c => c === 'VENDEDOR'),
    motivo:    h.findIndex(c => c.includes('MOTIVO')),
    produto:   h.findIndex(c => c === 'PRODUTO'),
    vencedor:  h.findIndex(c => c.includes('EMPRESA') && c.includes('VENCEDOR')),
    qtd:       h.findIndex(c => c === 'QUANTIDADE'),
    val_venc:  h.findIndex(c => c.includes('VALOR') && c.includes('VENCEDOR')),
    val_min:   h.findIndex(c => c.includes('VALOR') && c.includes('MÍNIMO')),
    qtd_ganha: h.findIndex(c => c.includes('GANHAMOS') || c.includes('GANHA')),
    val_unit:  h.findIndex(c => c.includes('UNITÁRIO') || c.includes('UNIT')),
    qtd_comp:  h.findIndex(c => c.includes('COMPRADA')),
    prazo:     h.findIndex(c => c.includes('PRAZO')),
    validade:  h.findIndex(c => c.includes('VALIDADE') || c.includes('CONTRATO') || c.includes('ATA')),
  };
}

async function batchInsert(table, rows, label) {
  let ok = 0, err = 0;
  const CHUNK = 20;
  for (let i = 0; i < rows.length; i += CHUNK) {
    const chunk = rows.slice(i, i + CHUNK);
    const { error } = await SB.from(table).insert(chunk);
    if (error) { log(`  ❌ Erro inserindo ${label}: ${error.message}`, 'err'); err += chunk.length; }
    else ok += chunk.length;
    await sleep(50);
  }
  return { ok, err };
}

// ══════════════════════════════════════════
// FORM VEN 012 — LICITAÇÕES
// ══════════════════════════════════════════
async function importLicitacoes(file) {
  log('\n📂 Lendo planilha de licitações...', 'info');
  const wb = await readExcel(file);
  log('Abas: ' + wb.SheetNames.join(', '));

  await importAba012Pesquisa(wb);
  await importAba012NaoParticipamos(wb);
  await importAba012Perdidas(wb);
  // Vencidos also inside Form 012 if present
  const venc = wb.SheetNames.find(s => s.toLowerCase().includes('vencid'));
  if (venc) await importAbaVencidos(wb, venc, '25%');
  setProgress(50);
}

async function importAba012Pesquisa(wb) {
  const name = wb.SheetNames.find(s => s.toLowerCase().includes('pesquisa'));
  if (!name) { log('⚠️ Aba Pesquisa não encontrada', 'warn'); return; }
  const rows = sheetRows(wb, name);
  const hi = findHeaderRow(rows);
  if (hi < 0) { log('⚠️ Cabeçalho Pesquisa não encontrado', 'warn'); return; }
  const idx = buildIdx(rows[hi]);
  const data = rows.slice(hi+1).filter(r => r.some(c => c !== ''));
  log(`📋 Pesquisa: ${data.length} linhas`);

  const toInsert = [];
  for (const r of data) {
    const empresa = clean(r[idx.empresa]);
    if (!empresa) continue;
    toInsert.push({
      licitante: normLit(r[idx.licitante]),
      cliente: empresa,
      uf: clean(r[idx.uf]),
      pregao: clean(r[idx.pregao]),
      uasg: clean(r[idx.uasg]),
      bb: clean(r[idx.bb]),
      data: parseDate(r[idx.data]),
      site: clean(r[idx.site]),
      status: clean(r[idx.status]),
      obs: clean(r[idx.obs]),
      vendedor: clean(r[idx.vendedor]) || 'Sem Vendedor',
      encerrado: false,
      fase: 'ativo',
    });
  }
  const { ok, err } = await batchInsert('pregoes', toInsert, 'pesquisa');
  log(`✅ Pesquisa: ${ok} importados, ${err} erros`, 'ok');
}

async function importAba012NaoParticipamos(wb) {
  const name = wb.SheetNames.find(s => s.toLowerCase().includes('participamos') || s.toLowerCase().includes('não part'));
  if (!name) { log('⚠️ Aba Não participamos não encontrada', 'warn'); return; }
  const rows = sheetRows(wb, name);
  const hi = findHeaderRow(rows);
  if (hi < 0) return;
  const idx = buildIdx(rows[hi]);
  const data = rows.slice(hi+1).filter(r => r.some(c => c !== ''));
  log(`📋 Não participamos: ${data.length} linhas`);

  const toInsert = [];
  for (const r of data) {
    const empresa = clean(r[idx.empresa]);
    if (!empresa) continue;
    toInsert.push({
      licitante: normLit(r[idx.licitante]),
      cliente: empresa,
      uf: clean(r[idx.uf]),
      pregao: clean(r[idx.pregao]),
      uasg: clean(r[idx.uasg]),
      bb: clean(r[idx.bb]),
      data: parseDate(r[idx.data]),
      site: clean(r[idx.site]),
      obs: clean(r[idx.motivo]),
      encerrado: false,
      fase: 'arquivado', // oculto por padrão
    });
  }
  const { ok, err } = await batchInsert('pregoes', toInsert, 'nao_participamos');
  log(`✅ Não participamos: ${ok} importados (ocultos), ${err} erros`, 'ok');
}

async function importAba012Perdidas(wb) {
  const name = wb.SheetNames.find(s => s.toLowerCase().includes('perdida'));
  if (!name) { log('⚠️ Aba Perdidas não encontrada', 'warn'); return; }
  const rows = sheetRows(wb, name);
  const hi = findHeaderRow(rows);
  if (hi < 0) return;
  const idx = buildIdx(rows[hi]);
  const data = rows.slice(hi+1).filter(r => r.some(c => c !== ''));
  log(`📋 Perdidas: ${data.length} linhas`);

  // Group by pregão (handle merged rows where empresa is blank)
  const grupos = {};
  let cur = {};
  for (const r of data) {
    const first = clean(r[0]).toUpperCase();
    if (MESES.includes(first)) continue;
    const empresa = clean(r[idx.empresa]);
    if (empresa) {
      cur = {
        licitante: normLit(r[idx.licitante]),
        cliente: empresa,
        uf: clean(r[idx.uf]),
        pregao: clean(r[idx.pregao]),
        uasg: clean(r[idx.uasg]),
        bb: clean(r[idx.bb]),
        data: parseDate(r[idx.data]),
        site: clean(r[idx.site]),
      };
    }
    const produto = clean(r[idx.produto]);
    if (!produto || !cur.pregao) continue;
    const key = `${cur.licitante}|${cur.cliente}|${cur.pregao}`;
    if (!grupos[key]) grupos[key] = { ...cur, encerrado: true, fase: 'ativo', itens: [] };
    grupos[key].itens.push({
      produto,
      resultado: 'perdido',
      empresa_venc: clean(r[idx.vencedor]),
      qtd_venc: Number(clean(r[idx.qtd])) || null,
      valor_venc: parseNum(r[idx.val_venc]),
      valor_min: parseNum(r[idx.val_min]),
      motivo_perda: clean(r[idx.motivo]),
    });
  }

  let ok = 0, err = 0;
  for (const p of Object.values(grupos)) {
    const { data: ins, error } = await SB.from('pregoes').insert({
      licitante:p.licitante,cliente:p.cliente,uf:p.uf,pregao:p.pregao,
      uasg:p.uasg,bb:p.bb,data:p.data,site:p.site,encerrado:true,fase:'ativo'
    }).select('id').single();
    if (error) { err++; continue; }
    if (p.itens.length) await SB.from('itens').insert(p.itens.map(it=>({...it,pregao_id:ins.id})));
    ok++;
    await sleep(30);
  }
  log(`✅ Perdidas: ${ok} pregões importados, ${err} erros`, 'ok');
}

// ══════════════════════════════════════════
// FORM VEN 014 — PEDIDOS E SALDO
// ══════════════════════════════════════════
async function importPedidosSaldo(file) {
  log('\n📂 Lendo planilha de pedidos e saldo...', 'info');
  const wb = await readExcel(file);
  log('Abas: ' + wb.SheetNames.join(', '));

  // Import all saldo sheets (2024, 2025, 2026)
  const saldoSheets = wb.SheetNames.filter(s =>
    s.toLowerCase().includes('saldo') || s.toLowerCase().includes('vencida')
  );
  log(`Abas de saldo encontradas: ${saldoSheets.join(', ')}`);

  for (const name of saldoSheets) {
    await importAbaSaldo(wb, name);
  }
  setProgress(90);
}

async function importAbaSaldo(wb, name) {
  const rows = sheetRows(wb, name);
  if (!rows) return;
  const hi = findHeaderRow(rows);
  if (hi < 0) { log(`⚠️ Cabeçalho não encontrado em "${name}"`, 'warn'); return; }
  const idx = buildIdx(rows[hi]);
  const data = rows.slice(hi+1).filter(r => r.some(c => c !== ''));
  log(`📋 "${name}": ${data.length} linhas`);

  // Group by pregão — can have both ganho and perdido items
  const grupos = {};
  let cur = {};

  for (const r of data) {
    const first = clean(r[0]).toUpperCase();
    if (MESES.includes(first)) continue;

    const empresa = idx.empresa >= 0 ? clean(r[idx.empresa]) : '';
    const pregao  = idx.pregao  >= 0 ? clean(r[idx.pregao])  : '';

    if (empresa) {
      cur = {
        licitante: normLit(r[0]),
        cliente: empresa,
        pregao,
        prazo_entrega: idx.prazo >= 0 ? clean(r[idx.prazo]) : '',
        validade_ata: idx.validade >= 0 ? parseDate(r[idx.validade]) : null,
      };
    }

    const produto = idx.produto >= 0 ? clean(r[idx.produto]) : '';
    if (!produto || !cur.pregao) continue;

    const key = `${cur.licitante}|${cur.cliente}|${cur.pregao}`;
    if (!grupos[key]) grupos[key] = { ...cur, encerrado: true, fase: 'ativo', itens: [] };

    const qtdGanha = idx.qtd_ganha >= 0 ? Number(clean(r[idx.qtd_ganha]))||0 : 0;
    const valUnit  = idx.val_unit  >= 0 ? parseNum(r[idx.val_unit]) : null;

    // Saldo sheet only contains won items — always mark as ganho
    grupos[key].itens.push({
      produto, resultado: 'ganho',
      qtd_ganha: qtdGanha,
      valor_unit: valUnit,
    });
  }

  let ok = 0, err = 0;
  for (const p of Object.values(grupos)) {
    const { data: ins, error } = await SB.from('pregoes').insert({
      licitante: p.licitante,
      cliente: p.cliente,
      pregao: p.pregao,
      prazo_entrega: p.prazo_entrega,
      validade_ata: p.validade_ata,
      encerrado: true,
      fase: 'ativo',
    }).select('id').single();

    if (error) { log(`  ❌ ${p.cliente} — ${error.message}`, 'err'); err++; continue; }
    if (p.itens.length) await SB.from('itens').insert(p.itens.map(it=>({...it, pregao_id:ins.id})));
    ok++;
    await sleep(30);
  }
  log(`✅ "${name}": ${ok} pregões importados, ${err} erros`, 'ok');
}

async function importAbaVencidos(wb, name) {
  return importAbaSaldo(wb, name); // same logic
}

function parseNum(v) {
  if (!v && v !== 0) return null;
  const s = String(v).replace(',','.');
  const n = Number(s);
  return isNaN(n) ? null : n;
}
</script>
</body>
</html>
